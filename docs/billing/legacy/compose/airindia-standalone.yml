version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: airindia_user
      POSTGRES_PASSWORD: airindia_pass
      POSTGRES_DB: airindia_billing
    ports:
      - "5433:5432"   # different host port from the Agilent app's 5432
    volumes:
      - airindia_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://airindia_user:airindia_pass@db:5432/airindia_billing
      FRONTEND_ORIGIN: http://localhost:5174
    ports:
      - "8001:8001"
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  airindia_pgdata:
